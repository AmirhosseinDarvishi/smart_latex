name: smart_latex
description: >-
  A Flutter widget that renders LaTeX and Markdown from AI models correctly.
  Sanitizes common AI mistakes (double backslashes, Persian digits, unbalanced
  braces, \text{} around digits) and prevents flutter_math_fork layout crashes
  by isolating KaTeX metrics from the surrounding Persian/RTL text style.
version: 1.0.0
homepage: https://github.com/yourusername/smart_latex

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_math_fork: ">=0.7.4 <2.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: false
