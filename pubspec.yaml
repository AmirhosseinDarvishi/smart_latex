name: smart_latex
description: >-
  Robust LaTeX rendering for Flutter. Renders mixed text and math, repairs
  malformed input (double backslashes, Persian/Arabic digits, unbalanced
  braces, single-char \text{}), and isolates KaTeX metrics from custom fonts
  and RTL layouts to avoid flutter_math_fork layout crashes.
version: 1.0.0
homepage: https://github.com/AmirhosseinDarvishi/smart_latex
repository: https://github.com/AmirhosseinDarvishi/smart_latex
issue_tracker: https://github.com/AmirhosseinDarvishi/smart_latex/issues
topics:
  - latex
  - math
  - katex
  - rtl
  - rendering

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_math_fork: ">=0.7.4 <2.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: false
